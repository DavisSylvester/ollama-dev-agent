name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

      # Non-blocking: the LangChain tool() factory has known upstream typing
      # mismatches. Surfaced here for visibility without failing the build.
      - name: Type check (non-blocking)
        run: bun run typecheck
        continue-on-error: true
